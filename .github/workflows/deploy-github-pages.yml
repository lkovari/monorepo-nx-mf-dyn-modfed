name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: nx-mf-df/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: nx-mf-df

      - name: Build and stage
        env:
          GH_PAGES_BASE: /${{ github.event.repository.name }}/
        run: |
          pnpm run gh-build
          pnpm run gh-stage
        working-directory: nx-mf-df

      - uses: actions/upload-pages-artifact@v4
        with:
          path: nx-mf-df/gh-pages-dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
